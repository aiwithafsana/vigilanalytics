# ── Vigil — Nginx reverse proxy ──────────────────────────────────────────────
# Sits in front of both backend (FastAPI :8000) and frontend (Next.js :3000).
# In production: terminate TLS here and uncomment the HTTPS server block.

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ── Redirect HTTP → HTTPS (production) ─────────────────────────────────────
# Uncomment when a cert is in place:
#
# server {
#     listen 80;
#     server_name vigil.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;          # catch-all; replace with real domain in production

    # ── Security headers (layer on top of FastAPI's SecurityHeadersMiddleware) ─
    add_header X-Frame-Options           DENY                             always;
    add_header X-Content-Type-Options    nosniff                          always;
    add_header Referrer-Policy           strict-origin-when-cross-origin  always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    proxy_connect_timeout  10s;
    proxy_read_timeout     60s;
    proxy_send_timeout     30s;

    # ── Forwarding headers ────────────────────────────────────────────────────
    proxy_set_header  Host               $host;
    proxy_set_header  X-Real-IP          $remote_addr;
    proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Proto  $scheme;

    # ── API — proxied to FastAPI ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Allow document uploads up to 50 MB
        client_max_body_size 50m;

        # Buffer settings for streaming responses (PDF, CSV export)
        proxy_buffering          off;
        proxy_request_buffering  off;
    }

    # ── WebSocket — real-time alerts (/api/ws/...) ────────────────────────────
    location /api/ws/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;   # keep-alive for long-lived WS connections
    }

    # ── API docs (FastAPI Swagger / ReDoc) ────────────────────────────────────
    # Remove or restrict access in production (e.g. allow only internal IPs)
    location ~ ^/api/(docs|redoc|openapi\.json) {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── Static assets — long cache, no buffering needed ─────────────────────
    location /_next/static/ {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_cache_valid  200 1y;
        add_header         Cache-Control "public, immutable, max-age=31536000";
    }

    # ── Everything else — Next.js frontend ───────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }
}

# ── HTTPS server block (production) ─────────────────────────────────────────
# Uncomment and fill in cert paths to enable TLS termination at Nginx.
#
# server {
#     listen 443 ssl http2;
#     server_name vigil.yourdomain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/vigil.yourdomain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/vigil.yourdomain.com/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#
#     # ... same location blocks as above ...
# }
